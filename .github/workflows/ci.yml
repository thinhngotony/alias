name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  lint:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint Bash scripts
        run: |
          shellcheck -s bash install.sh
          shellcheck -s bash uninstall.sh
          shellcheck -s bash load.sh
          shellcheck -s bash aliases/*.sh

      - name: Lint POSIX scripts
        run: shellcheck -s sh install-universal.sh

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Bash syntax
        run: |
          bash -n install.sh
          bash -n uninstall.sh
          bash -n load.sh
          for f in aliases/*.sh; do
            bash -n "$f" && echo "$f OK" || exit 1
          done

      - name: Check POSIX sh syntax
        run: sh -n install-universal.sh

      - name: Check PowerShell syntax
        shell: pwsh
        run: |
          foreach ($file in @("install.ps1", "uninstall.ps1", "load.ps1")) {
            $errors = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile("$PWD/$file", [ref]$null, [ref]$errors)
            if ($errors.Count -gt 0) { $errors | ForEach-Object { Write-Error $_ }; throw "$file has syntax errors" }
            Write-Host "$file OK"
          }

  test-functional:
    name: Functional Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test input validation
        run: |
          source load.sh 2>/dev/null || true

          echo "=== Valid names ==="
          _alias_validate_name "my-alias" "Test" || exit 1
          _alias_validate_name "foo_bar" "Test" || exit 1
          _alias_validate_name "k8s" "Test" || exit 1
          echo "PASS"

          echo "=== Path traversal blocked ==="
          _alias_validate_name "../etc" "Test" 2>&1 && exit 1 || true
          _alias_validate_name "foo/bar" "Test" 2>&1 && exit 1 || true
          echo "PASS"

          echo "=== Shell metacharacters blocked ==="
          _alias_validate_name 'test;rm' "Test" 2>&1 && exit 1 || true
          _alias_validate_name 'test$HOME' "Test" 2>&1 && exit 1 || true
          _alias_validate_name "" "Test" 2>&1 && exit 1 || true
          echo "PASS"

      - name: Test alias-add and alias-remove
        run: |
          source load.sh 2>/dev/null || true
          mkdir -p "$HOME/.alias/custom"

          # Add an alias
          alias-add testcat mytest "echo hello" 2>&1
          grep -q "^alias mytest=" "$HOME/.alias/custom/testcat.sh" || { echo "FAIL: alias not added"; exit 1; }
          echo "PASS: alias added"

          # Remove it
          alias-remove testcat mytest 2>&1
          grep -q "^alias mytest=" "$HOME/.alias/custom/testcat.sh" && { echo "FAIL: alias not removed"; exit 1; }
          echo "PASS: alias removed"

          # Bad inputs rejected
          alias-add "../etc" "test" "echo hi" 2>&1 | grep -q "Error" || { echo "FAIL: path traversal not blocked"; exit 1; }
          alias-add "good" "bad;name" "echo hi" 2>&1 | grep -q "Error" || { echo "FAIL: metachar not blocked"; exit 1; }
          echo "PASS: bad inputs rejected"

          rm -rf "$HOME/.alias/custom/testcat.sh"

      - name: Test secrets encryption round-trip
        run: |
          source aliases/secrets.sh 2>/dev/null || true
          SECRETS_DIR="/tmp/test-secrets-$$"
          mkdir -p "$SECRETS_DIR"
          chmod 700 "$SECRETS_DIR"

          # Encrypt
          test_value="my-super-secret-token-12345"
          test_pass="testpassword123"
          printf '%s' "$test_value" | openssl enc -aes-256-cbc -pbkdf2 -salt -pass "pass:${test_pass}" -out "$SECRETS_DIR/test.enc"

          # Not plaintext
          grep -q "$test_value" "$SECRETS_DIR/test.enc" 2>/dev/null && { echo "FAIL: secret in plaintext"; exit 1; }
          echo "PASS: encrypted at rest"

          # Decrypt succeeds
          decrypted=$(openssl enc -aes-256-cbc -pbkdf2 -d -salt -pass "pass:${test_pass}" -in "$SECRETS_DIR/test.enc")
          [ "$decrypted" = "$test_value" ] || { echo "FAIL: decryption mismatch"; exit 1; }
          echo "PASS: decrypt matches"

          # Wrong password fails
          openssl enc -aes-256-cbc -pbkdf2 -d -salt -pass "pass:wrongpassword" -in "$SECRETS_DIR/test.enc" 2>/dev/null && { echo "FAIL: wrong password accepted"; exit 1; } || true
          echo "PASS: wrong password rejected"

          # Legacy detection
          echo "test" | base64 > "$SECRETS_DIR/legacy.enc"
          _secret_is_legacy "$SECRETS_DIR/legacy.enc" || { echo "FAIL: legacy not detected"; exit 1; }
          _secret_is_legacy "$SECRETS_DIR/test.enc" && { echo "FAIL: openssl detected as legacy"; exit 1; } || true
          echo "PASS: legacy detection works"

          rm -rf "$SECRETS_DIR"

      - name: Test zsh compatibility (no bash-only read -p)
        run: |
          # read -p means "read from coprocess" in zsh, not "prompt"
          # All prompts must use printf + read -r -s instead
          failed=0
          for f in aliases/*.sh load.sh; do
            if grep -n 'read.*-p ' "$f" 2>/dev/null; then
              echo "FAIL: found bash-only 'read -p' in $f (breaks zsh)"
              failed=1
            fi
          done
          [ "$failed" -eq 0 ] || exit 1
          echo "PASS: no bash-only read -p usage"

      - name: Test zsh compatibility (no local inside loops)
        run: |
          # In zsh, re-declaring 'local var' inside a loop prints var=value
          # All local declarations must be before the loop
          failed=0
          for f in aliases/*.sh load.sh; do
            # Find while/for loops containing 'local' declarations
            if awk '/while |for /{loop=1} /done/{loop=0} loop && /^[[:space:]]*local /{print FILENAME":"NR": "$0; found=1} END{exit found?1:0}' "$f" 2>/dev/null; then
              echo "FAIL: found 'local' inside loop in $f (causes output leak in zsh)"
              failed=1
            fi
          done
          [ "$failed" -eq 0 ] || exit 1
          echo "PASS: no local declarations inside loops"

      - name: Test clipboard fallback (no display)
        run: |
          source aliases/secrets.sh 2>/dev/null || true
          SECRETS_DIR="/tmp/test-clip-$$"
          mkdir -p "$SECRETS_DIR"
          chmod 700 "$SECRETS_DIR"

          test_value="clipboard-test-secret"
          test_pass="testpass"
          printf '%s' "$test_value" | openssl enc -aes-256-cbc -pbkdf2 -salt -pass "pass:${test_pass}" -out "$SECRETS_DIR/clip.enc"
          chmod 600 "$SECRETS_DIR/clip.enc"

          # On CI there is no display, so clipboard tools should fail
          # and alias-secret-get should fall back to printing the value
          export SECRETS_DIR
          output=$(printf '%s\n' "$test_pass" | alias-secret-get clip 2>&1)
          if echo "$output" | grep -q "$test_value"; then
            echo "PASS: falls back to printing when clipboard unavailable"
          elif echo "$output" | grep -q "copied to clipboard"; then
            echo "FAIL: claims clipboard success without a display"
            exit 1
          else
            echo "FAIL: secret not in output: $output"
            exit 1
          fi

          rm -rf "$SECRETS_DIR"

      - name: Test zsh sources secrets correctly
        run: |
          # Verify secrets.sh can be sourced and functions are defined in zsh
          if command -v zsh >/dev/null 2>&1; then
            zsh -c '
              source aliases/secrets.sh
              type alias-secret-add >/dev/null 2>&1 || { echo "FAIL: alias-secret-add not defined in zsh"; exit 1; }
              type alias-secret-get >/dev/null 2>&1 || { echo "FAIL: alias-secret-get not defined in zsh"; exit 1; }
              type alias-secret-list >/dev/null 2>&1 || { echo "FAIL: alias-secret-list not defined in zsh"; exit 1; }
              type alias-secret-remove >/dev/null 2>&1 || { echo "FAIL: alias-secret-remove not defined in zsh"; exit 1; }
              echo "PASS: all secret functions defined in zsh"
            '
          else
            echo "SKIP: zsh not available"
          fi

      - name: Test symlink protection
        run: |
          TEST_DIR="/tmp/test-custom-$$"
          mkdir -p "$TEST_DIR"
          echo "# regular file" > "$TEST_DIR/good.sh"
          echo "# evil target" > "/tmp/evil-target-$$.sh"
          ln -s "/tmp/evil-target-$$.sh" "$TEST_DIR/evil.sh"

          sourced_count=0
          for file in "$TEST_DIR"/*.sh; do
              if [ -f "$file" ] && [ ! -L "$file" ]; then
                  sourced_count=$((sourced_count + 1))
              fi
          done
          [ "$sourced_count" -eq 1 ] || { echo "FAIL: expected 1 file, got $sourced_count"; exit 1; }
          echo "PASS: symlink skipped"

          rm -rf "$TEST_DIR" "/tmp/evil-target-$$.sh"

  test-install:
    name: Test Install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test universal installer (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          sh install-universal.sh
          # Verify files
          test -f ~/.alias/load.sh || { echo "FAIL: load.sh missing"; exit 1; }
          test -f ~/.alias/env.sh || { echo "FAIL: env.sh missing"; exit 1; }
          test -d ~/.alias/custom || { echo "FAIL: custom dir missing"; exit 1; }
          # Verify env.sh permissions
          perms=$(stat -c '%a' ~/.alias/env.sh 2>/dev/null || stat -f '%Lp' ~/.alias/env.sh 2>/dev/null)
          [ "$perms" = "600" ] || echo "WARNING: env.sh permissions are $perms (expected 600)"
          # Verify shell config was updated
          grep -q '\.alias/load\.sh' ~/.bashrc 2>/dev/null || grep -q '\.alias/load\.sh' ~/.zshrc 2>/dev/null || { echo "FAIL: no shell configured"; exit 1; }
          # Verify loader is valid bash
          bash -n ~/.alias/load.sh
          echo "PASS: universal installer"

      - name: Test bash installer (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          # Clean up previous install
          rm -rf ~/.alias
          sed -i '/\.alias/d' ~/.bashrc 2>/dev/null || true
          sed -i '/Hyber/d' ~/.bashrc 2>/dev/null || true

          bash install.sh
          test -f ~/.alias/load.sh || { echo "FAIL: load.sh missing"; exit 1; }
          test -f ~/.alias/env.sh || { echo "FAIL: env.sh missing"; exit 1; }
          bash -n ~/.alias/load.sh
          echo "PASS: bash installer"

      - name: Test loading aliases (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          # Source and verify aliases are defined
          bash -c '
            source ~/.alias/load.sh 2>/dev/null
            # Check that key functions exist
            type alias-help >/dev/null 2>&1 || { echo "FAIL: alias-help not defined"; exit 1; }
            type alias-add >/dev/null 2>&1 || { echo "FAIL: alias-add not defined"; exit 1; }
            type _alias_validate_name >/dev/null 2>&1 || { echo "FAIL: _alias_validate_name not defined"; exit 1; }
            echo "PASS: aliases loaded"
          '

      - name: Test install (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          $env:SKIP_POLICY_CHECK = "1"
          . .\install.ps1
          if (-not (Test-Path ~\.alias\load.ps1)) { throw "load.ps1 not found" }
          if (-not (Test-Path ~\.alias\env.ps1)) { throw "env.ps1 not found" }
          if (-not (Test-Path ~\.alias\custom)) { throw "custom directory not found" }
          Write-Host "PASS: Windows installation"

  test-install-fish:
    name: Test Install (fish shell)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install fish
        run: |
          sudo apt-get update
          sudo apt-get install -y fish

      - name: Test installer detects fish and installs fish config
        run: |
          # Run the installer from fish (simulates Codespaces)
          fish -c 'sh install-universal.sh'

          # Verify fish config was installed
          test -f ~/.config/fish/conf.d/hyper-alias.fish || { echo "FAIL: fish config not installed"; exit 1; }
          echo "PASS: fish config installed"

          # Verify bash was also configured (multi-shell install)
          test -f ~/.alias/load.sh || { echo "FAIL: bash loader not installed"; exit 1; }
          echo "PASS: bash loader also installed"

      - name: Test fish aliases load correctly
        run: |
          fish -c '
            source ~/.config/fish/conf.d/hyper-alias.fish
            # Verify aliases exist
            type alias-help >/dev/null 2>&1; or begin; echo "FAIL: alias-help not defined"; exit 1; end
            type alias-git >/dev/null 2>&1; or begin; echo "FAIL: alias-git not defined"; exit 1; end
            echo "PASS: fish aliases loaded"
          '

      - name: Test sourcing .bashrc from fish fails gracefully
        run: |
          # This is the exact scenario from Codespaces
          # fish should NOT be told to source .bashrc
          # Verify our installer output includes the fish activation command
          output=$(fish -c 'sh install-universal.sh' 2>&1)
          echo "$output"
          # Should mention fish source command
          echo "$output" | grep -q "hyper-alias.fish" || { echo "FAIL: fish activation not shown"; exit 1; }
          echo "PASS: fish activation command shown"

  test-uninstall:
    name: Test Uninstall
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install then uninstall
        run: |
          # Install first
          sh install-universal.sh
          test -f ~/.alias/load.sh || { echo "FAIL: not installed"; exit 1; }

          # Uninstall
          bash uninstall.sh
          test -d ~/.alias && { echo "FAIL: ~/.alias still exists"; exit 1; } || true
          grep -q '\.alias' ~/.bashrc 2>/dev/null && { echo "FAIL: .bashrc still has alias lines"; exit 1; } || true
          echo "PASS: clean uninstall"

  release:
    name: Create Release
    needs: [lint, syntax-check, test-functional, test-install, test-install-fish, test-uninstall]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog for version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CHANGELOG=$(awk "/^## \[${VERSION#v}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md | head -50)

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "CONTENT<<$EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Hyber Alias ${{ steps.version.outputs.VERSION }}
          body: |
            ## Release ${{ steps.version.outputs.VERSION }} 🚀

            ${{ steps.changelog.outputs.CONTENT }}

            ---

            ### Installation

            **Linux / macOS**
            ```sh
            curl -sfS https://alias.hyberorbit.com/install | sh
            ```

            **Windows PowerShell**
            ```powershell
            iwr -useb https://alias.hyberorbit.com/install.ps1 | iex
            ```

            ### Features
            - One-command install/uninstall
            - Multi-shell support: bash, zsh, fish, PowerShell
            - Auto-detects active shell (even in Codespaces)
            - AES-256-CBC encrypted secret storage
            - Input validation prevents injection attacks
            - Auto-update on shell start with atomic file operations

            **Full Changelog**: https://github.com/thinhngotony/alias/compare/v1.0.0...${{ steps.version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
